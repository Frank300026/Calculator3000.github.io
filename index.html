<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Calculator 3000</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#151513">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calculator 3000">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --user-font-scale: 1;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --color-bg: #f6f4ef;
      --color-surface: #fbfaf7;
      --color-surface-2: #f2efe9;
      --color-surface-offset: #e9e3da;
      --color-border: #d7d0c5;
      --color-text: #241f18;
      --color-text-muted: #736f68;
      --color-text-faint: #a8a197;
      --color-text-inverse: #faf8f3;
      --color-primary: #0f6b73;
      --color-number: #2d4f8f;
      --color-number-soft: #dce6fb;
      --color-operator: #9a5a12;
      --color-operator-soft: #f5e3cf;
      --color-equal: #0f6b73;
      --color-equal-soft: #d3e8e5;
      --color-error: #9a345f;
      --shadow-sm: 0 1px 2px rgba(26, 22, 18, 0.08);
      --shadow-md: 0 10px 24px rgba(26, 22, 18, 0.12);
      --shadow-lg: 0 18px 42px rgba(26, 22, 18, 0.16);
      --font-body: 'Satoshi', Inter, sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #151513;
      --color-surface: #1d1c19;
      --color-surface-2: #262420;
      --color-surface-offset: #312f2a;
      --color-border: #3d3933;
      --color-text: #f2eee6;
      --color-text-muted: #beb6aa;
      --color-text-faint: #827c73;
      --color-text-inverse: #151513;
      --color-primary: #61aeb7;
      --color-number: #8caeff;
      --color-number-soft: #22314d;
      --color-operator: #f2af61;
      --color-operator-soft: #42301f;
      --color-equal: #6fc6ba;
      --color-equal-soft: #1f3d39;
      --color-error: #db72a0;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.32);
      --shadow-lg: 0 18px 42px rgba(0, 0, 0, 0.44);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; }
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-text);
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--color-primary) 10%, transparent), transparent 34%),
        linear-gradient(180deg, var(--color-bg), color-mix(in srgb, var(--color-surface) 96%, var(--color-bg)));
      display: flex;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }

    button, input { font: inherit; }
    button {
      border: none;
      cursor: pointer;
      transition: transform var(--transition-interactive), background var(--transition-interactive), color var(--transition-interactive), box-shadow var(--transition-interactive), border-color var(--transition-interactive);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-md);
    }

    .expression:focus,
    .expression:focus-visible {
      outline: none;
    }

    .app {
      width: min(100%, 32rem);
      height: 100dvh;
      background: color-mix(in srgb, var(--color-surface) 96%, transparent);
      border-left: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      border-radius: 0;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 560px) {
      .app {
        height: min(100dvh, 46rem);
        margin: var(--space-4) 0;
        border-radius: 1.75rem;
        border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
      }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      padding: calc(var(--space-4) + env(safe-area-inset-top, 0px)) var(--space-4) 0;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .logo {
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      color: var(--color-primary);
      background: color-mix(in srgb, var(--color-primary) 14%, var(--color-surface-offset));
      flex: 0 0 auto;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .theme-toggle {
      width: 2.5rem;
      height: 2.5rem;
      display: grid;
      place-items: center;
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      color: var(--color-text);
      border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent);
      box-shadow: var(--shadow-sm);
    }

    .history-modal {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, black 55%, transparent);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      padding: var(--space-4);
      padding-bottom: 0;
    }

    .history-modal.open {
      display: flex;
    }

    .history-modal-panel {
      width: min(100%, 32rem);
      max-height: 78vh;
      background: var(--color-surface);
      border-radius: 1.5rem 1.5rem 0 0;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent);
    }

    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);
    }

    .history-modal-header h2 {
      margin: 0;
      font-size: var(--text-sm);
      font-weight: 700;
    }

    .history-modal-close {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: var(--radius-full);
      background: var(--color-surface-2);
      color: var(--color-text);
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent);
    }

    .history-modal-list {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding: var(--space-2) var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: color-mix(in srgb, var(--color-text) 22%, transparent) transparent;
    }

    .history-modal-list::-webkit-scrollbar {
      width: 0.3rem;
    }

    .history-modal-list::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--color-text) 22%, transparent);
      border-radius: var(--radius-full);
    }

    .history-modal-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .history-modal-empty {
      color: var(--color-text-faint);
      font-size: var(--text-sm);
      text-align: center;
      padding: var(--space-6) 0;
    }

    .history-modal .entry {
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-2);
      border-bottom: 1px solid color-mix(in srgb, var(--color-text) 7%, transparent);
      border-radius: 0;
    }

    .history-modal .entry:first-child {
      border-top: 1px solid color-mix(in srgb, var(--color-text) 7%, transparent);
    }

    .history-modal .entry:hover {
      background: color-mix(in srgb, var(--color-surface-2) 60%, transparent);
    }

    .history-modal .entry .formula {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-align: left;
      flex: 1 1 auto;
    }

    .history-modal .entry .result {
      font-size: var(--text-sm);
      color: var(--color-text);
      flex: 0 0 auto;
    }

    .history-modal-count {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding: 0 var(--space-4) var(--space-2);
    }

    .settings-list {
      overflow-y: auto;
      padding: var(--space-4) var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .setting-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .setting-row-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-2);
    }

    .setting-row-header span:first-child {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--color-text);
    }

    .setting-row-header span:last-child {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
    }

    .setting-row input[type="range"] {
      width: 100%;
      height: 1.6rem;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .setting-row input[type="range"]::-webkit-slider-runnable-track {
      height: 0.4rem;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
    }

    .setting-row input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 1.3rem;
      height: 1.3rem;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      border: 2px solid var(--color-surface);
      box-shadow: var(--shadow-sm);
      margin-top: -0.45rem;
    }

    .setting-row input[type="range"]::-moz-range-track {
      height: 0.4rem;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
    }

    .setting-row input[type="range"]::-moz-range-thumb {
      width: 1.3rem;
      height: 1.3rem;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      border: 2px solid var(--color-surface);
      box-shadow: var(--shadow-sm);
    }

    .decimals-options {
      display: flex;
      gap: var(--space-2);
    }

    .decimals-option {
      flex: 1;
      min-height: 2.6rem;
      border-radius: 0.85rem;
      background: var(--color-surface-2);
      color: var(--color-text);
      border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent);
      font-weight: 700;
      font-size: var(--text-sm);
    }

    .decimals-option.active {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-color: color-mix(in srgb, var(--color-primary) 70%, black 12%);
    }

    .settings-header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .history-modal-close.save {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-color: color-mix(in srgb, var(--color-primary) 70%, black 12%);
      width: auto;
      padding: 0 var(--space-3);
      gap: var(--space-1);
      display: flex;
      align-items: center;
      font-size: var(--text-xs);
      font-weight: 700;
    }

    .history-modal-close.clear {
      background: color-mix(in srgb, var(--color-error) 14%, var(--color-surface-2));
      color: var(--color-error);
      border-color: color-mix(in srgb, var(--color-error) 26%, transparent);
    }



    .settings-toast {
      position: fixed;
      bottom: calc(var(--space-6) + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(0.5rem);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 700;
      box-shadow: var(--shadow-md);
      opacity: 0;
      pointer-events: none;
      z-index: 60;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .settings-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .screen {
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: calc(var(--space-3) * 2);
      flex: 1 1 auto;
      min-height: 0;
    }

    .history {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: var(--space-2);
      padding: 0 var(--space-1);
      border: none;
      background: transparent;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 0;
    }

    .entry {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.35rem;
      text-align: right;
      font-variant-numeric: tabular-nums lining-nums;
      flex-wrap: nowrap;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0;
      background: transparent;
      border: none;
      width: 100%;
    }

    .entry .formula {
      color: var(--color-text-muted);
      font-size: calc(clamp(0.78rem, 0.72rem + 0.14vw, 0.85rem) * var(--user-font-scale));
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry .result {
      color: color-mix(in srgb, var(--color-text) 82%, var(--color-bg));
      font-size: calc(clamp(0.85rem, 0.78rem + 0.16vw, 0.92rem) * var(--user-font-scale));
      font-weight: 400;
      flex: 0 0 auto;
    }

    .entry.latest .formula {
      color: var(--color-text);
      font-size: calc(clamp(1.1rem, 0.98rem + 0.4vw, 1.3rem) * var(--user-font-scale));
      font-weight: 400;
    }

    .entry.latest .result {
      color: var(--color-text);
      font-size: calc(clamp(2.6rem, 2.1rem + 2vw, 3.8rem) * var(--user-font-scale));
      font-weight: 400;
      line-height: 1;
    }

    .entry.error .result,
    .entry.latest.error .result {
      color: var(--color-error);
    }

    .expression-wrap {
      display: grid;
      position: relative;
      flex: 0 0 auto;
    }

    .expression {
      width: 100%;
      min-height: 4rem;
      border: none;
      border-radius: 1.2rem;
      background: transparent;
      color: var(--color-text);
      padding: var(--space-3) var(--space-2);
      font-size: calc(var(--text-lg) * var(--user-font-scale));
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .empty-hint {
      position: absolute;
      top: 50%;
      right: calc(var(--space-2) + 0.15rem);
      transform: translateY(-50%);
      width: 0.15rem;
      height: 1.7rem;
      background: var(--color-text-faint);
      border-radius: var(--radius-full);
      opacity: 0;
      pointer-events: none;
    }

    .empty-hint.visible {
      animation: blink-caret 1.1s steps(1) infinite;
    }

    @keyframes blink-caret {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .empty-hint.visible {
        animation: none;
        opacity: 0.6;
      }
    }

    .keyboard {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(4.8rem, 1fr);
      gap: var(--space-3);
      padding: 0 var(--space-4) calc(var(--space-4) + env(safe-area-inset-bottom, 0px));
      flex: 0 0 auto;
    }

    .numbers-grid,
    .operators-grid {
      display: grid;
      gap: var(--space-3);
    }

    .numbers-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .operators-grid {
      grid-template-columns: 1fr;
      grid-auto-rows: minmax(3.95rem, auto);
    }

    .key {
      min-height: 3.95rem;
      border-radius: 1.05rem;
      border: 1px solid color-mix(in srgb, var(--color-text) 9%, transparent);
      box-shadow: var(--shadow-sm);
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 700;
      background: var(--color-surface-2);
      color: var(--color-text);
      display: grid;
      place-items: center;
      font-variant-numeric: tabular-nums;
    }

    .key svg {
      width: 1.4rem;
      height: 1.4rem;
    }

    .key.delete svg {
      width: 1.65rem;
      height: 1.65rem;
    }

    .key.number {
      background: color-mix(in srgb, var(--color-number-soft) 88%, var(--color-surface-2));
      color: var(--color-number);
      border-color: color-mix(in srgb, var(--color-number) 22%, transparent);
    }

    .key.operator {
      background: color-mix(in srgb, var(--color-operator-soft) 90%, var(--color-surface-2));
      color: var(--color-operator);
      border-color: color-mix(in srgb, var(--color-operator) 24%, transparent);
    }

    .key.utility {
      background: color-mix(in srgb, var(--color-surface-offset) 76%, var(--color-surface-2));
      color: var(--color-text);
    }

    .key.equal {
      background: var(--color-equal);
      color: var(--color-text-inverse);
      border-color: color-mix(in srgb, var(--color-equal) 70%, black 12%);
      min-height: 4.8rem;
      font-size: 1.5rem;
      box-shadow: var(--shadow-md);
    }

    .key.delete.holding {
      background: color-mix(in srgb, var(--color-error) 18%, var(--color-surface-offset));
      color: var(--color-error);
      border-color: color-mix(in srgb, var(--color-error) 26%, transparent);
    }

    @media (max-width: 420px) {
      .app { border-radius: 1.3rem; }
      .keyboard { grid-template-columns: 1fr 4.4rem; gap: var(--space-2); }
      .numbers-grid, .operators-grid { gap: var(--space-2); }
      .key { min-height: 3.55rem; border-radius: 0.95rem; }
      .key.equal { min-height: 4.2rem; }
      .expression { font-size: var(--text-base); }
      .entry.latest .result { font-size: clamp(1.7rem, 1.2rem + 2.8vw, 2.1rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Calcolatrice con formule, percentuali corrette e cronologia risultati">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="3.5" width="14" height="17" rx="3"></rect>
            <path d="M8.5 8h7"></path>
            <path d="M8.5 12h2"></path>
            <path d="M13.5 12h2"></path>
            <path d="M8.5 16h2"></path>
            <path d="M13.5 16h2"></path>
          </svg>
        </div>
        <div class="brand-copy">
          <h1>Calculator 3000</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="theme-toggle" type="button" id="settingsToggle" aria-label="Apri impostazioni">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>

        <div class="settings-header-actions">

              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <path d="M17 21v-8H7v8"></path>
              <path d="M7 3v5h8"></path>

            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 6l12 12"></path>

            <span id="fontSizeValue">100%</span>

          <input type="range" id="fontSizeRange" min="80" max="140" step="5" value="100" aria-label="Dimensione numeri">

          <div class="setting-row-header">
            <span>Cifre dopo la virgola</span>
          </div>

            <button class="decimals-option" type="button" data-decimals="0">0</button>
            <button class="decimals-option" type="button" data-decimals="1">1</button>
            <button class="decimals-option active" type="button" data-decimals="2">2</button>
            <button class="decimals-option" type="button" data-decimals="3">3</button>

  <div class="settings-toast" id="settingsToast" role="status" aria-live="polite">Impostazioni salvate</div>

  <script>
    const expressionInput = document.getElementById('expression');
    const historyEl = document.getElementById('history');
    const keys = document.querySelectorAll('.key[data-value], .key[data-action]');
    const deleteKey = document.getElementById('deleteKey');
    const themeToggle = document.querySelector('[data-theme-toggle]');
    const root = document.documentElement;
    const emptyHint = document.getElementById('emptyHint');
    const historyStorageKey = 'calculator3000-history';
    const draftStorageKey = 'calculator3000-draft';
    let history = [];
    const visibleCount = 7;
    const deleteHoldDelay = 550;
    const historyToggle = document.getElementById('historyToggle');
    const historyModal = document.getElementById('historyModal');
    const historyModalClose = document.getElementById('historyModalClose');
    const historyModalList = document.getElementById('historyModalList');
    const historyModalCount = document.getElementById('historyModalCount');
    const historyClear = document.getElementById('historyClear');

    const settingsToggle = document.getElementById('settingsToggle');
    const settingsModal = document.getElementById('settingsModal');
    const settingsModalClose = document.getElementById('settingsModalClose');
    const settingsSave = document.getElementById('settingsSave');
    const settingsToast = document.getElementById('settingsToast');
    const fontSizeRange = document.getElementById('fontSizeRange');
    const fontSizeValue = document.getElementById('fontSizeValue');
    const decimalsOptions = document.getElementById('decimalsOptions');

    const defaultSettings = { fontScale: 100, decimals: 2 };
    const settings = { ...defaultSettings };
    const storageKey = 'calculator3000-settings';

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (saved && typeof saved === 'object') {
          settings.fontScale = saved.fontScale ?? defaultSettings.fontScale;
          settings.decimals = saved.decimals ?? defaultSettings.decimals;
        }
      } catch (err) {
        Object.assign(settings, defaultSettings);
      }
    }

    function applySettings() {
      root.style.setProperty('--user-font-scale', settings.fontScale / 100);
      fontSizeValue.textContent = settings.fontScale + '%';
      fontSizeRange.value = settings.fontScale;
      decimalsOptions.querySelectorAll('.decimals-option').forEach((b) => {
        b.classList.toggle('active', Number(b.dataset.decimals) === settings.decimals);
      });
    }

    function saveSettings() {
      localStorage.setItem(storageKey, JSON.stringify(settings));
      showSettingsToast();
      if (lastEvaluated) syncDisplayFromRaw();
      closeSettingsModal();
    }

    function showSettingsToast() {
      settingsToast.classList.add('visible');
      window.setTimeout(() => settingsToast.classList.remove('visible'), 1600);
    }

    function openSettingsModal() {
      settingsModal.classList.add('open');
      settingsModal.setAttribute('aria-hidden', 'false');
    }

    function closeSettingsModal() {
      settingsModal.classList.remove('open');
      settingsModal.setAttribute('aria-hidden', 'true');
    }

    settingsToggle.addEventListener('click', openSettingsModal);
    settingsModalClose.addEventListener('click', closeSettingsModal);
    settingsSave.addEventListener('click', saveSettings);
    settingsModal.addEventListener('click', (event) => {
      if (event.target === settingsModal) closeSettingsModal();
    });

    fontSizeRange.addEventListener('input', () => {
      settings.fontScale = Number(fontSizeRange.value);
      applySettings();
    });

    decimalsOptions.querySelectorAll('.decimals-option').forEach((btn) => {
      btn.addEventListener('click', () => {
        settings.decimals = Number(btn.dataset.decimals);
        decimalsOptions.querySelectorAll('.decimals-option').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        if (lastEvaluated) {
          syncDisplayFromRaw();
        }
      });
    });

    loadSettings();

    let holdTimer = null;
    let holdTriggered = false;
    let rawExpression = '';
    let lastEvaluated = false;

    function updateEmptyHint() {
      emptyHint.classList.toggle('visible', rawExpression.length === 0);
    }

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      themeToggle.innerHTML = theme === 'dark'
        ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>'
        : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2"></path><path d="M12 21v2"></path><path d="M4.22 4.22l1.42 1.42"></path><path d="M18.36 18.36l1.42 1.42"></path><path d="M1 12h2"></path><path d="M21 12h2"></path><path d="M4.22 19.78l1.42-1.42"></path><path d="M18.36 5.64l1.42-1.42"></path></svg>';
    }

    setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    themeToggle.addEventListener('click', () => {
      setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    function unformatDisplayValue(value) {
      return value.replace(/\./g, '').replace(/,/g, '.');
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) throw new Error('Risultato non valido');
      const factor = Math.pow(10, settings.decimals);
      const rounded = Math.round((value + Number.EPSILON) * factor) / factor;
      return new Intl.NumberFormat('it-IT', {
        minimumFractionDigits: 0,
        maximumFractionDigits: settings.decimals
      }).format(rounded);
    }

    function formatEditable(raw) {
      if (!raw) return '';
      let out = '';
      let numberBuffer = '';

      function flush() {
        if (!numberBuffer) return;
        out += formatNumberForInput(numberBuffer);
        numberBuffer = '';
      }

      for (const char of raw) {
        if (/\d|\./.test(char)) {
          numberBuffer += char;
        } else {
          flush();
          out += char === '.' ? ',' : char;
        }
      }
      flush();
      return out;
    }

    function formatNumberForInput(rawNumber) {
      if (!rawNumber) return '';
      const trailingDot = rawNumber.endsWith('.');
      const [intPartRaw, decPartRaw = ''] = rawNumber.split('.');
      const intDigits = (intPartRaw || '0').replace(/^0+(?=\d)/, '') || '0';
      const intFormatted = intDigits.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      const decPart = decPartRaw.slice(0, settings.decimals);
      if (trailingDot) return intFormatted + ',';
      if (rawNumber.includes('.')) return intFormatted + ',' + decPart;
      return intFormatted;
    }

    function syncDisplayFromRaw() {
      expressionInput.value = formatEditable(rawExpression);
      updateEmptyHint();
      persistDraft();
    }

    const basicOperators = ['+', '-', '*', '/'];

    function insertValue(value) {
      if (lastEvaluated && /[0-9,.]/.test(value)) {
        rawExpression = '';
      }
      lastEvaluated = false;
      const normalized = value === ',' ? '.' : value;

      if (basicOperators.includes(normalized) && rawExpression.length) {
        const lastChar = rawExpression[rawExpression.length - 1];
        if (basicOperators.includes(lastChar)) {
          rawExpression = rawExpression.slice(0, -1) + normalized;
          syncDisplayFromRaw();
          const len = expressionInput.value.length;
          expressionInput.focus({ preventScroll: true });
          expressionInput.setSelectionRange(len, len);
          return;
        }
      }

      rawExpression += normalized;
      syncDisplayFromRaw();
      const len = expressionInput.value.length;
      expressionInput.focus({ preventScroll: true });
      expressionInput.setSelectionRange(len, len);
    }

    function clearCurrentExpression() {
      rawExpression = '';
      lastEvaluated = false;
      syncDisplayFromRaw();
    }

    function backspaceExpression() {
      rawExpression = rawExpression.slice(0, -1);
      lastEvaluated = false;
      syncDisplayFromRaw();
      const len = expressionInput.value.length;
      expressionInput.focus({ preventScroll: true });
      expressionInput.setSelectionRange(len, len);
    }

    function normalizeOperators(text) {
      return text
        .replace(/\s+/g, '')
        .replace(/\./g, '')
        .replace(/,/g, '.')
        .replace(/×/g, '*')
        .replace(/÷/g, '/')
        .replace(/−/g, '-');
    }

    function tokenize(expression) {
      const tokens = [];
      let i = 0;
      while (i < expression.length) {
        const char = expression[i];
        if (/\d|\./.test(char)) {
          let number = char;
          i++;
          while (i < expression.length && /[\d.]/.test(expression[i])) number += expression[i++];
          if ((number.match(/\./g) || []).length > 1) throw new Error('Numero non valido');
          tokens.push({ type: 'number', value: Number(number) });
          continue;
        }
        if ('+-*/()%'.includes(char)) {
          tokens.push({ type: 'operator', value: char });
          i++;
          continue;
        }
        throw new Error('Caratteri non ammessi');
      }
      return tokens;
    }

    function preprocessTokens(tokens) {
      const processed = [];
      for (let i = 0; i < tokens.length; i++) {
        const token = tokens[i];
        const prev = processed[processed.length - 1];
        if (token.type === 'operator' && token.value === '%') {
          const base = findPercentBase(processed);
          if (base === null || !prev || prev.type !== 'number') {
            processed.push({ type: 'operator', value: '%' });
            continue;
          }
          processed.pop();
          processed.push({ type: 'number', value: (base * prev.value) / 100 });
          continue;
        }
        if (token.type === 'operator' && token.value === '-' && (!prev || (prev.type === 'operator' && prev.value !== ')'))) {
          processed.push({ type: 'number', value: 0 });
          processed.push(token);
          continue;
        }
        processed.push(token);
      }
      return processed;
    }

    function findPercentBase(processed) {
      let depth = 0;
      for (let i = processed.length - 2; i >= 0; i--) {
        const token = processed[i];
        if (token.type === 'operator' && token.value === ')') { depth++; continue; }
        if (token.type === 'operator' && token.value === '(') { if (depth > 0) depth--; continue; }
        if (depth > 0) continue;
        if (token.type === 'operator' && (token.value === '+' || token.value === '-')) {
          return evaluateProcessedTokens(processed.slice(0, i));
        }
        if (token.type === 'operator' && (token.value === '*' || token.value === '/')) {
          return 1;
        }
      }
      return 1;
    }

    function toRpn(tokens) {
      const output = [];
      const operators = [];
      const precedence = { '+': 1, '-': 1, '*': 2, '/': 2 };
      tokens.forEach((token) => {
        if (token.type === 'number') {
          output.push(token);
          return;
        }
        if (token.value === '(') {
          operators.push(token);
          return;
        }
        if (token.value === ')') {
          while (operators.length && operators[operators.length - 1].value !== '(') output.push(operators.pop());
          if (!operators.length) throw new Error('Parentesi non valide');
          operators.pop();
          return;
        }
        while (operators.length && operators[operators.length - 1].value !== '(' && precedence[operators[operators.length - 1].value] >= precedence[token.value]) {
          output.push(operators.pop());
        }
        operators.push(token);
      });
      while (operators.length) {
        const op = operators.pop();
        if (op.value === '(') throw new Error('Parentesi non chiuse');
        output.push(op);
      }
      return output;
    }

    function evaluateRpn(rpn) {
      const stack = [];
      rpn.forEach((token) => {
        if (token.type === 'number') {
          stack.push(token.value);
          return;
        }
        const b = stack.pop();
        const a = stack.pop();
        if (a === undefined || b === undefined) throw new Error('Formula non valida');
        if (token.value === '+') stack.push(a + b);
        if (token.value === '-') stack.push(a - b);
        if (token.value === '*') stack.push(a * b);
        if (token.value === '/') {
          if (b === 0) throw new Error('Divisione per zero');
          stack.push(a / b);
        }
      });
      if (stack.length !== 1 || Number.isNaN(stack[0])) throw new Error('Formula non valida');
      return stack[0];
    }

    function evaluateProcessedTokens(tokens) {
      return evaluateRpn(toRpn(tokens));
    }

    function evaluateExpression(raw) {
      const normalized = normalizeOperators(raw);
      if (!normalized) throw new Error('Inserisci una formula');
      const tokens = tokenize(normalized);
      const processed = preprocessTokens(tokens);
      return evaluateProcessedTokens(processed);
    }

    function createEntryButton(item, isLatest) {
      const entry = document.createElement('button');
      entry.type = 'button';
      entry.className = 'entry' + (isLatest ? ' latest' : '') + (item.isError ? ' error' : '');
      entry.innerHTML = `<span class="formula">${item.formula}</span><span class="result">= ${item.result}</span>`;
      entry.addEventListener('click', () => {
        if (item.isError) return;
        rawExpression = unformatDisplayValue(item.result);
        lastEvaluated = false;
        syncDisplayFromRaw();
        closeHistoryModal();
        const len = expressionInput.value.length;
        expressionInput.focus({ preventScroll: true });
        expressionInput.setSelectionRange(len, len);
      });
      return entry;
    }

    function renderHistory() {
      historyEl.innerHTML = '';
      if (!history.length) return;
      const visible = history.slice(-visibleCount);
      visible.forEach((item, index) => {
        const isLatest = index === visible.length - 1;
        historyEl.appendChild(createEntryButton(item, isLatest));
      });
    }

    function renderHistoryModal() {
      historyModalList.innerHTML = '';
      if (!history.length) {
        historyModalCount.textContent = '';
        historyModalList.innerHTML = '<div class="history-modal-empty">Nessun calcolo salvato.</div>';
        return;
      }
      historyModalCount.textContent = history.length + (history.length === 1 ? ' calcolo salvato' : ' calcoli salvati');
      history.slice().reverse().forEach((item) => {
        historyModalList.appendChild(createEntryButton(item, false));
      });
      historyModalList.scrollTop = 0;
    }

    function openHistoryModal() {
      renderHistoryModal();
      historyModal.classList.add('open');
      historyModal.setAttribute('aria-hidden', 'false');
    }

    function closeHistoryModal() {
      historyModal.classList.remove('open');
      historyModal.setAttribute('aria-hidden', 'true');
    }

    historyToggle.addEventListener('click', openHistoryModal);
    historyClear.addEventListener('click', () => {
      if (!history.length) return;
      history.length = 0;
      persistHistory();
      renderHistory();
      renderHistoryModal();
    });
    historyModalClose.addEventListener('click', closeHistoryModal);
    historyModal.addEventListener('click', (event) => {
      if (event.target === historyModal) closeHistoryModal();
    });

    const maxHistory = 50;

    function persistHistory() {
      try {
        localStorage.setItem(historyStorageKey, JSON.stringify(history));
      } catch (err) {
        /* storage full or unavailable, ignore silently */
      }
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem(historyStorageKey));
        if (Array.isArray(saved)) {
          history = saved.slice(-maxHistory);
        }
      } catch (err) {
        history = [];
      }
    }

    function persistDraft() {
      try {
        localStorage.setItem(draftStorageKey, JSON.stringify({
          rawExpression,
          lastEvaluated
        }));
      } catch (err) {
        /* ignore */
      }
    }

    function loadDraft() {
      try {
        const saved = JSON.parse(localStorage.getItem(draftStorageKey));
        if (saved && typeof saved === 'object') {
          rawExpression = typeof saved.rawExpression === 'string' ? saved.rawExpression : '';
          lastEvaluated = Boolean(saved.lastEvaluated);
        }
      } catch (err) {
        rawExpression = '';
        lastEvaluated = false;
      }
    }

    function pushHistory(formula, result, isError = false) {
      history.push({ formula, result, isError });
      if (history.length > maxHistory) {
        history.shift();
      }
      persistHistory();
      renderHistory();
    }

    function calculate() {
      const displayRaw = expressionInput.value.trim();
      try {
        const result = evaluateExpression(displayRaw);
        const formatted = formatNumber(result);
        pushHistory(displayRaw, formatted, false);
        rawExpression = unformatDisplayValue(formatted);
        lastEvaluated = true;
        syncDisplayFromRaw();
        const len = expressionInput.value.length;
        expressionInput.focus({ preventScroll: true });
        expressionInput.setSelectionRange(len, len);
      } catch (error) {
        pushHistory(displayRaw || 'Formula vuota', error.message, true);
      }
    }

    keys.forEach((key) => {
      key.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        expressionInput.blur();
      });
      key.addEventListener('click', (event) => {
        event.preventDefault();
        const { value, action } = key.dataset;
        if (value) insertValue(value);
        if (action === 'calculate') calculate();
      });
    });

    function startDeleteHold() {
      holdTriggered = false;
      deleteKey.classList.add('holding');
      holdTimer = window.setTimeout(() => {
        holdTriggered = true;
        clearCurrentExpression();
      }, deleteHoldDelay);
    }

    function stopDeleteHold() {
      deleteKey.classList.remove('holding');
      if (holdTimer) {
        clearTimeout(holdTimer);
        holdTimer = null;
      }
    }

    deleteKey.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      expressionInput.blur();
      startDeleteHold();
    });

    deleteKey.addEventListener('pointerup', () => {
      stopDeleteHold();
      if (!holdTriggered) backspaceExpression();
    });

    deleteKey.addEventListener('pointerleave', stopDeleteHold);
    deleteKey.addEventListener('pointercancel', stopDeleteHold);

    expressionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        calculate();
        return;
      }
      if (event.key === 'Backspace') {
        event.preventDefault();
        backspaceExpression();
        return;
      }
      if (event.key === 'Delete') {
        event.preventDefault();
        clearCurrentExpression();
        return;
      }
      if (event.key.length === 1 && /[0-9()+\-*/%,.]/.test(event.key)) {
        event.preventDefault();
        insertValue(event.key);
      }
    });

    expressionInput.addEventListener('paste', (event) => {
      event.preventDefault();
      const pasted = (event.clipboardData || window.clipboardData).getData('text');
      rawExpression = normalizeOperators(pasted);
      lastEvaluated = false;
      syncDisplayFromRaw();
    });

    loadHistory();
    loadDraft();
    applySettings();
    syncDisplayFromRaw();
    updateEmptyHint();
    renderHistory();

    window.addEventListener('pagehide', () => {
      persistHistory();
      persistDraft();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        persistHistory();
        persistDraft();
      }
    });

    window.addEventListener('beforeunload', () => {
      persistHistory();
      persistDraft();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {
          /* service worker registration failed, app still works online */
        });
      });
    }
  </script>
</body>
</html>
